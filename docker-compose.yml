version: '3.9'

services:
  postgres:
    image: postgres:16-alpine
    container_name: hics_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hics}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hics_dev_secret}
      POSTGRES_DB: ${POSTGRES_DB:-hics}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - '5432:5432'
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-hics}']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: hics_redis
    command: redis-server --requirepass ${REDIS_PASSWORD:-hics_redis_secret} --appendonly yes
    volumes:
      - redis_data:/data
    ports:
      - '6379:6379'
    healthcheck:
      test: ['CMD', 'redis-cli', '--no-auth-warning', '-a', '${REDIS_PASSWORD:-hics_redis_secret}', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      target: development
    container_name: hics_backend
    environment:
      NODE_ENV: development
      DATABASE_URL: postgresql://${POSTGRES_USER:-hics}:${POSTGRES_PASSWORD:-hics_dev_secret}@postgres:5432/${POSTGRES_DB:-hics}
      REDIS_URL: redis://:${REDIS_PASSWORD:-hics_redis_secret}@redis:6379
      JWT_ACCESS_SECRET: ${JWT_ACCESS_SECRET}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:5173}
      PORT: 3001
      MINIO_ENDPOINT: minio
      MINIO_PORT: 9000
      MINIO_USE_SSL: 'false'
      MINIO_ACCESS_KEY: ${MINIO_ROOT_USER:-hics_minio}
      MINIO_SECRET_KEY: ${MINIO_ROOT_PASSWORD:-hics_minio_secret}
      MINIO_BUCKET: ${MINIO_BUCKET:-hics-exports}
    volumes:
      - ./backend:/app
      - /app/node_modules
    ports:
      - '3001:3001'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    restart: unless-stopped
    command: npm run dev

  minio:
    image: minio/minio:latest
    container_name: hics_minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:-hics_minio}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:-hics_minio_secret}
    volumes:
      - minio_data:/data
    ports:
      - '9000:9000'
      - '9001:9001'
    healthcheck:
      test: ['CMD', 'mc', 'ready', 'local']
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      target: development
    container_name: hics_frontend
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:3001}
      VITE_WS_URL: ${VITE_WS_URL:-ws://localhost:3001}
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - '5173:5173'
    depends_on:
      - backend
    restart: unless-stopped
    command: npm run dev -- --host 0.0.0.0

volumes:
  postgres_data:
  redis_data:
  minio_data:
